# LANEye Configuration

scanning:
  interface: eth0
  subnet: 192.168.1.0/24
  interval: 60

database:
  type: sqlite
  path: /data/laneye.db

server:
  host: 0.0.0.0
  port: 8000

notifications:
  enabled: true
  channels:
    - telegram
    - webhook
  telegram:
    bot_token: YOUR_BOT_TOKEN
    chat_id: YOUR_CHAT_ID
  webhook:
    url: https://your-webhook-url.com/alert

elk:
  enabled: false
  elasticsearch_url: http://localhost:9200
  index_name: laneye-hosts

grafana:
  enabled: true
  metrics_endpoint: /metrics

logging:
  level: INFO
