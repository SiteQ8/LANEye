version: '3.8'

services:
  laneye:
    build: .
    container_name: laneye
    network_mode: host
    environment:
      - INTERFACE=eth0
      - TZ=Asia/Kuwait
    volumes:
      - laneye-data:/data
      - ./config.yaml:/app/config.yaml
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Optional: Prometheus ---
  prometheus:
    image: prom/prometheus:latest
    container_name: laneye-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped
    profiles: ["monitoring"]

  # --- Optional: Grafana ---
  grafana:
    image: grafana/grafana:latest
    container_name: laneye-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    profiles: ["monitoring"]

  # --- Optional: Elasticsearch ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: laneye-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    profiles: ["elk"]

  # --- Optional: Kibana ---
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: laneye-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    restart: unless-stopped
    profiles: ["elk"]

volumes:
  laneye-data:
  prometheus-data:
  grafana-data:
  elastic-data:
